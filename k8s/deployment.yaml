apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-backend
  labels:
    app: guardian-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guardian-backend
  template:
    metadata:
      labels:
        app: guardian-backend
    spec:
      containers:
      - name: backend
        image: guardian-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: guardian-config
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-frontend
  labels:
    app: guardian-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guardian-frontend
  template:
    metadata:
      labels:
        app: guardian-frontend
    spec:
      containers:
      - name: frontend
        image: guardian-frontend:latest
        ports:
        - containerPort: 80
