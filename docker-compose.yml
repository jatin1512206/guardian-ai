version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./guardian.db:/app/guardian.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./guardian.db
      - DEBUG=true
      - LOG_LEVEL=INFO

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
